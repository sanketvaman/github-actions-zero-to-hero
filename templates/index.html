<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Zero To Hero</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f0c29,#1d1c2b,#24243e);
    color:#fff;
    font-family:sans-serif;
}
.container { text-align:center; }
h1 { color:#7b2ff7; margin-bottom:10px; }

.pipeline {
    margin-top:20px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}
.step {
    padding:8px 14px;
    border:1px solid #7b2ff7;
    border-radius:20px;
    font-size:12px;
}
</style>
</head>

<body>
<div class="container">
    <h1>DevOps Zero To Hero 🚀</h1>
    <p>CI/CD Pipeline via GitHub Actions (USA Edition BOOM)</p>

    <div class="pipeline">
        <div class="step">Build ✅</div>
        <div class="step">Test ✅</div>
        <div class="step">Lint ✅</div>
        <div class="step">Deploy 🚀</div>
    </div>
</div>
</body>
</html>
