# This is the name of the workflow that will be displayed on Actions Tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on:
  workflow_dispatch:
    inputs:
      environment:
        description: This is the environment value where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
# Every job needs a separate runner, its called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code Clone from Github"

  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker container
        run: echo "Docker Container Build"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

  deploy:
    if: inputs.environment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the App
        run: echo "Docker compose deployed the app"
