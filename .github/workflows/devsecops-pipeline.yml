name: DevSecOps End to End Pipeline

on:
    push:
        branches: [main]

jobs:
    # CI (Continuous Integration with Security Scan)
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    secrets-scan:
        uses: ./.github/workflows/code-quality.yml
        secrets: inherit
    
    dependency-scan:
        uses: ./.github/workflows/dependency-sacn.yml

    docker-scan:
        uses: ./.github/workflows/docker-lint.yml

    # Build once the security scans are complted
    build:
        needs: [code-quality, secrets-scan, dependency-scan, docker-scan]
        uses: ./.github/workflows/docker-build-push.yml
        screts: inherit


